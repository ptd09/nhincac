<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Xem PDF</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .header {
            padding: 15px;
            text-align: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            width: 90%;
            max-width: 900px;
            margin: 20px auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 15px;
        }

        iframe {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 15px;
        }

        .actions {
            text-align: center;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #4facfe;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            margin: 5px;
        }

        button:hover {
            background: #3b8de0;
        }
    </style>
</head>
<body>

<div class="header">
    📄 Xem file PDF
</div>

<div class="container">
    <div class="actions">
        <button onclick="zoomIn()">🔍 Zoom +</button>
        <button onclick="zoomOut()">🔎 Zoom -</button>
        <a href="abcd.pdf" download>
            <button>⬇️ Tải xuống</button>
        </a>
    </div>

    <iframe id="pdfViewer" src="https://github.com/ptd09/nhincac/releases/tag/v1.0/thcschuvananq1_690139_sach-giao-khoa-khoa-hoc-tu-nhien-khtn-lop-7-chan-troi-sang-tao912202316_92202520.pdf"></iframe>
</div>

<script>
    let zoom = 100;
    const viewer = document.getElementById("pdfViewer");

    function zoomIn() {
        zoom += 10;
        viewer.style.height = (600 + zoom) + "px";
    }

    function zoomOut() {
        zoom -= 10;
        viewer.style.height = (600 + zoom) + "px";
    }
</script>

</body>
</html>
